<!--
Descirption:
    - Shows order confirmation
    - Shows subtotal, total, and tax
    - Submit order (POST to /checkout)
    - Deliver order to MongDB JSON/collection
-->
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Checkout Complete!</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="leftNav">
            <h2>Menu</h2>

            <a href="/login">Login</a>
            <a href="/register">Register</a>
            <a href="/profile">Profile</a>
            <a href="/products">Products</a>
            <a href="/cart">Cart</a>
            <a href="/home">Home</a>
        </div>

        <div class="pageContent">
            <div class="heroBox">
                <h1>Checkout Complete</h1>
                <p>Your order has been processed successfully!</p>
            </div>
            <p id="msg"></p>

            <div id="checkoutCard" class="fadeInUp"></div>
        </div>

        <script>
            async function completeCheckout() {
                const token = localStorage.getItem("authToken")

                if (!token) {
                    window.location.href = "/login"
                    return
                }

                const msg = document.getElementById("msg")

                try {
                    const res = await fetch("/api/cart", {
                        headers: {
                            "Authorization": token
                        }
                    })

                    const cart = await res.json();

                    if (!res.ok) {
                        msg.textContent = cart.error || "Could not load your cart"
                        msg.style.color = "red"
                    } else {
                        calculateCost(cart);
                    }

                } catch (err) {
                    console.error("Error adding to cart", err)
                    msg.textContent = "Network error while adding to cart"
                    msg.style.color = "red"
                }
            }

            async function calculateCost(cart) {
                const res = await fetch("/api/products")
                if (!res.ok) {
                    document.getElementById("msg").textContent = "Could not load products."
                    return
                }

                const products = await res.json()

                const priceObject = {};

                cart.items.forEach(function(cartItem) {
                    const product = getProduct(cartItem, products);

                    priceObject[cartItem.productId] = product.price
                })

                postCartPrices(priceObject);
            }

            async function postCartPrices(priceObject) {
                const token = localStorage.getItem("authToken")

                if (!token) {
                    window.location.href = "/login"
                    return
                }

                const msg = document.getElementById("msg")

                try {
                    const res = await fetch("/api/checkout", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": token
                        },
                        body: JSON.stringify({
                            pricing: priceObject
                        })
                    })

                    const data = await res.json()

                    if (!res.ok) {
                        msg.textContent = data.error || "Could not checkout"
                        msg.style.color = "red"
                    } else {
                        msg.textContent = "Successfully Checked Out!"
                        msg.style.color = "green"
                        const body = document.getElementsByTagName("body")[0];

                        const totalCost = document.createElement("h3");
                        totalCost.textContent = `Total Cost: $${data.total.toFixed(2)}`;
                        body.appendChild(totalCost)
                    }
                } catch (err) {
                    console.error("Error displaying checkout", err)
                    msg.textContent = "Network error while checking out"
                    msg.style.color = "red"
                }
            }

            function getProduct(cartItem, products) {
                for (const p of products) {
                    if (p._id.toString() == cartItem.productId.toString()) {
                        return p;
                    }
                }

                return null;
            }

            document.addEventListener("DOMContentLoaded", completeCheckout)
        </script>
    </body>
</html>
